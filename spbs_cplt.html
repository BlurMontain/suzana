<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Supabase</title>
</head>
<body>
    <h1>Login com Supabase</h1>

    <form id="loginForm">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <button id="logoutBtn" style="display:none;">Sair</button>

    <pre id="output"></pre>

    <!-- Biblioteca oficial -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔹 Substitua pelos dados do seu projeto
        const SUPABASE_URL = "https://xseauhlaktlhrhjrsyew.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_pXfVDyKiGSKpXhc5T98JEQ_EhiBMxzu";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const output = document.getElementById("output");
        const loginForm = document.getElementById("loginForm");
        const logoutBtn = document.getElementById("logoutBtn");

        function log(msg) {
            output.textContent += msg + "\n";
        }

        // 🔐 LOGIN
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                log("❌ Erro no login: " + error.message);
            } else {
                log("✅ Login OK!");
                logoutBtn.style.display = "inline-block";
                buscarProdutos();
            }
        });

        // 🔓 LOGOUT
        logoutBtn.addEventListener("click", async () => {
            await supabase.auth.signOut();
            log("🔒 Logout realizado.");
            logoutBtn.style.display = "none";
        });

        // 📦 BUSCAR TABELA "produtos"
        async function buscarProdutos() {
            const { data, error } = await supabase
                .from("produtos")
                .select("*");

            if (error) {
                log("Erro ao buscar produtos: " + error.message);
            } else {
                log("📦 Produtos encontrados:");
                log(JSON.stringify(data, null, 2));
            }
        }
    </script>
</body>
</html>
